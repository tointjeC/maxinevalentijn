<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♂️ Escape Room: The Long Way Home ❤️</title>
    <style>
        :root { --dark: #0f0c29; --pink: #fb6f92; --cyan: #00d2ff; --gold: #ffb703; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: rgba(255, 255, 255, 0.05); border: 2px solid var(--pink); padding: 30px; border-radius: 20px; width: 90%; max-width: 700px; text-align: center; box-shadow: 0 0 40px rgba(251, 111, 146, 0.2); }
        .hidden { display: none; }
        .btn { background: var(--pink); border: none; padding: 15px 30px; color: white; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; margin: 10px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--pink); }
        .puzzel-area { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px dashed var(--cyan); line-height: 1.6; }
        input { background: transparent; border: 2px solid var(--cyan); color: white; padding: 10px; border-radius: 5px; width: 150px; text-align: center; font-size: 1.2rem; }
        .hint { color: var(--gold); font-size: 0.9rem; margin-top: 15px; font-style: italic; }
        .timer { font-family: monospace; font-size: 1.5rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px auto; width: 150px; }
        .dot { height: 20px; width: 20px; background: #444; border-radius: 50%; margin: auto; }
        .on { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

    <div id="setup" class="box">
        <h1>🔐 The Infinite Escape</h1>
        <p>Dit is een asymmetrisch spel. Jullie zien andere informatie.<br><strong>Praat veel, leg alles uit wat je ziet!</strong></p>
        <button class="btn" onclick="start(1)">Ik ben de Operator (Speler 1)</button>
        <button class="btn" onclick="start(2)" style="background:var(--cyan)">Ik ben de Navigator (Speler 2)</button>
    </div>

    <div id="game" class="box hidden">
        <div class="timer" id="timer">00:00</div>
        <h2 id="room-title">Laden...</h2>
        <div class="puzzel-area" id="content"></div>
        <div id="input-section">
            <input type="text" id="code-input" placeholder="CODE">
            <br>
            <button class="btn" onclick="check()">ONTGRENDEL</button>
        </div>
        <div id="feedback"></div>
    </div>

<script>
    let role = 0;
    let level = 1;
    let seconds = 0;

    const data = {
        1: {
            title: "Kamer 1: De Symbool-Frequentie",
            code: "739",
            p1: `<h3>HET PANEEL</h3>
                 <p>Ik zie drie knoppen met symbolen:</p>
                 <span style="font-size:30px">🌋 🌪️ 💎</span>
                 <p>Ik moet een 3-cijferige code invoeren.</p>`,
            p2: `<h3>DE DATA-ONTWANGST</h3>
                 <p>Ik zie een lijst met frequenties:</p>
                 <ul>
                    <li>🌪️ (Storm): 3 Hz</li>
                    <li>💎 (Diamant): 9 Hz</li>
                    <li>🌋 (Vulkaan): 7 Hz</li>
                    <li>🔥 (Vuur): 5 Hz</li>
                 </ul>
                 <p class="hint">Geef de cijfers door in de volgorde van zijn symbolen!</p>`
        },
        2: {
            title: "Kamer 2: De Kleuren-Draaikolk",
            code: "BGPY",
            p1: `<h3>DE KLEURENSLOTEN</h3>
                 <p>Ik zie 4 lege vakjes. Ik moet de beginletters van 4 kleuren typen (bijv. RGBY).</p>
                 <p>Mijn aanwijzing: <strong>"De zon gaat onder in de zee."</strong></p>`,
            p2: `<h3>HET KLEURENSCHEMA</h3>
                 <p>Ik zie een vreemd rijmpje:</p>
                 <p class="hint">"Blauw is het begin,<br>Groen volgt zijn zin.<br>Paars komt daarna pas,<br>Geel sluit het gas."</p>`
        },
        3: {
            title: "Kamer 3: Het Rooster-Raadsel",
            code: "258",
            p1: `<h3>HET LED-ROOSTER</h3>
                 <div class="grid">
                    <div class="dot on"></div><div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot on"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div><div class="dot on"></div>
                 </div>
                 <p>Ik zie een diagonaal van lampjes (linksboven naar rechtsonder).</p>
                 <p>Vraag de ander welke getallen hieronder staan.</p>`,
            p2: `<h3>HET NUMMER-BLOCK</h3>
                 <div style="font-family:monospace; font-size:20px;">
                    1 2 3<br>4 5 6<br>7 8 9
                 </div>
                 <p class="hint">Vertel de ander welk nummer op de plek van de 'on'-lampjes staat.</p>`
        },
        4: {
            title: "Kamer 4: De Morse Boodschap",
            code: "LIEFDE",
            p1: `<h3>HET GELUIDSSIGNAAL</h3>
                 <p>Ik hoor een signaal (of zie letters):</p>
                 <p style="font-size:20px; letter-spacing:5px;">.-.. .. . ..-. -.. .</p>
                 <p>Typ het vertaalde woord.</p>`,
            p2: `<h3>MORSE CODEBOEK</h3>
                 <p>.-.. = L | .. = I | . = E</p>
                 <p>..-. = F | -.. = D</p>
                 <p class="hint">Help de ander de stippen en streepjes te vertalen.</p>`
        },
        5: {
            title: "Kamer 5: De Antoine & Maxine Finale",
            code: "FOREVER",
            p1: `<h3>HET EINDSLOT</h3>
                 <p>De laatste vraag voor de vrijheid:</p>
                 <p>"Wat is de status van ons team?"</p>
                 <p>Hint: _ _ _ _ _ _ _ (7 letters)</p>`,
            p2: `<h3>HET DAGBOEK</h3>
                 <p>Ik zie de laatste pagina:</p>
                 <p class="hint">"Samen zijn wij niet voor even, maar voor..." (Engels woord)</p>`
        }
    };

    function start(r) {
        role = r;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        setInterval(() => { seconds++; updateTimer(); }, 1000);
        loadLevel();
    }

    function updateTimer() {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function loadLevel() {
        if(level > 5) { win(); return; }
        const l = data[level];
        document.getElementById('room-title').innerText = l.title;
        document.getElementById('content').innerHTML = (role === 1) ? l.p1 : l.p2;
        document.getElementById('input-section').className = (role === 1) ? "" : "hidden";
        document.getElementById('code-input').value = "";
    }

    function check() {
        let val = document.getElementById('code-input').value.toUpperCase().trim();
        if(val === data[level].code) {
            level++;
            document.getElementById('feedback').innerHTML = "✨ Correct! Kamer wordt geopend...";
            setTimeout(() => { document.getElementById('feedback').innerText = ""; loadLevel(); }, 1500);
        } else {
            document.getElementById('feedback').innerHTML = "❌ Systeemfout: Code onjuist.";
        }
    }

    function win() {
        document.getElementById('game').innerHTML = `
            <h1 style="color:var(--gold)">ONTSNAPT! 🏆</h1>
            <p>Jullie tijd: ${document.getElementById('timer').innerText}</p>
            <p>Jullie zijn het ultieme duo. Maxine & Antoine, onverslaanbaar!</p>
            <button class="btn" onclick="window.location.href='index.html'">Terug naar het begin</button>
        `;
    }
</script>
</body>
</html>
