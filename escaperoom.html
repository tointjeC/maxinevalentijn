<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>☣️ Protocol: Quantum Glitch</title>
    <style>
        :root { --danger: #ff0055; --neon: #00f2ff; --bg: #0a0a0c; }
        body { background: var(--bg); color: #a0a0a0; font-family: 'Consolas', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .terminal { background: #000; border: 2px solid #1a1a1a; padding: 40px; border-radius: 2px; width: 90%; max-width: 850px; box-shadow: 0 0 100px rgba(0,242,255,0.05); position: relative; }
        .glitch-border { position: absolute; top:0; left:0; width:100%; height:100%; border: 1px solid var(--neon); opacity: 0.2; pointer-events: none; }
        .hidden { display: none; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px 24px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .module { border: 1px solid #333; padding: 20px; margin: 20px 0; background: #050505; }
        .warning { color: var(--danger); font-weight: bold; }
        input { background: #000; border: 1px solid var(--neon); color: #fff; padding: 10px; width: 200px; text-align: center; font-size: 1.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        td, th { border: 1px solid #222; padding: 8px; text-align: center; }
        .strikethrough { text-decoration: line-through; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="setup" class="terminal">
        <h1 style="color:var(--neon)">> SYSTEM_INIT: OVERRIDE_REQUIRED</h1>
        <p>WAARSCHUWING: De verbinding is onstabiel. Gegevens kunnen corrupt zijn.</p>
        <p>Eén speler moet de **HARDWARE** bedienen, de ander moet de **BRONCODE** analyseren.</p>
        <button class="btn" onclick="start(1)">HARDWARE (Speler 1)</button>
        <button class="btn" onclick="start(2)">BRONCODE (Speler 2)</button>
    </div>

    <div id="game" class="terminal hidden">
        <div class="glitch-border"></div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 12px;">
            <span id="room-id">UNIT-ID: 88-ALPHA-M</span>
            <span id="timer" style="color:var(--neon)">00:00</span>
        </div>
        
        <div id="content"></div>

        <div id="input-area" class="hidden">
            <br>
            <input type="text" id="code-input" placeholder="Wachten op input...">
            <button class="btn" onclick="check()" style="margin-left:10px">SEND</button>
        </div>
        <div id="feedback" style="margin-top: 15px;"></div>
    </div>

<script>
    let role = 0;
    let level = 1;
    let seconds = 0;

    const data = {
        1: {
            title: "Module: V-CORP_4",
            code: "216",
            p1: `<div class="module">
                    <p class="warning">[SENSOR FOUT]</p>
                    <p>Ik zie 3 knoppen met beschadigde labels:</p>
                    <div style="font-size:25px">(&) (#) (%)</div>
                    <p>Ik heb een 3-cijferige code nodig. In het systeem staat: <br><strong>"WAARDE = [LABEL] + 1"</strong></p>
                 </div>`,
            p2: `<div class="module">
                    <h3>BRONCODE FRAGMENT #404</h3>
                    <table>
                        <tr><th>Symbool</th><th>Basis Waarde</th><th>Status</th></tr>
                        <tr><td>&</td><td>1</td><td>OK</td></tr>
                        <tr><td>#</td><td>5</td><td class="strikethrough">CORRUPT</td></tr>
                        <tr><td>#</td><td>0</td><td>OK</td></tr>
                        <tr><td>%</td><td>9</td><td class="strikethrough">OVERWRITTEN</td></tr>
                        <tr><td>%</td><td>5</td><td>OK</td></tr>
                    </table>
                    <p><i>Let op: Gebruik alleen 'OK' waarden. Speler 1 moet overal 1 bij optellen!</i></p>
                 </div>`
        },
        2: {
            title: "Module: HEX_COLOR_FLIP",
            code: "CYAN",
            p1: `<div class="module">
                    <p>Ik zie een knipperend lampje. Patroon:</p>
                    <p style="color:var(--neon); font-weight:bold;">KORT - LANG - KORT</p>
                    <p>Daaronder staan 3 kleuren: <strong>GEEL - PAARS - BLAUW</strong></p>
                 </div>`,
            p2: `<div class="module">
                    <h3>DECRYPTIE TABEL B</h3>
                    <p>Als patroon = K-L-K, negeer dan de eerste 2 kleuren.</p>
                    <p>Als kleur = BLAUW -> Typ 'CYAN'</p>
                    <p>Als kleur = GEEL -> Typ 'GOLD'</p>
                    <p>Als kleur = PAARS -> Typ 'VIOLET'</p>
                    <p class="warning">SYSTEEMFOUT: Als er ook een speler genaamd Antoine is, moet je altijd de kleur van Speler 1 vertalen.</p>
                 </div>`
        },
        3: {
            title: "Module: LOGIC_GATE_X",
            code: "82",
            p1: `<div class="module">
                    <p>Systeem vraagt om Coördinaten (2 cijfers).</p>
                    <p>Ik zie een som op mijn scherm:</p>
                    <p style="font-size:24px">A + B = ??</p>
                    <p>Maar ik weet niet wat A en B zijn.</p>
                 </div>`,
            p2: `<div class="module">
                    <h3>GEHEUGEN DUMP</h3>
                    <p>Waarde A: Zoek het aantal letters in jouw eigen naam.</p>
                    <p>Waarde B: Zoek het aantal 'M' karakters in de zin hieronder:</p>
                    <p style="color:#fff">"Maxine maakt mooie muziek met Antoine in de morgen."</p>
                    <p><i>Bereken: (A * 10) + B</i></p>
                 </div>`
        },
        4: {
            title: "Module: FINAL_SYNC",
            code: "TEAM",
            p1: `<div class="module">
                    <p>LAATSTE STAP: Synchronisatie.</p>
                    <p>Ik zie de volgende reeks letters:</p>
                    <p style="letter-spacing:10px">T . A .</p>
                    <p>Ik moet de ontbrekende letters invullen.</p>
                 </div>`,
            p2: `<div class="module">
                    <h3>CORE DATA</h3>
                    <p>De ontbrekende letters zijn:</p>
                    <p>Positie 2: Het alfabet-nummer van de 5e letter (E).</p>
                    <p>Positie 4: De eerste letter van het woord 'Maan'.</p>
                    <p class="warning">FOUT: De Archivaris moet de letters spellen, niet het woord zeggen!</p>
                 </div>`
        }
    };

    function start(r) {
        role = r;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        setInterval(() => { seconds++; updateTimer(); }, 1000);
        loadLevel();
    }

    function updateTimer() {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function loadLevel() {
        if(level > 4) { win(); return; }
        const l = data[level];
        document.getElementById('content').innerHTML = `<h2>${l.title}</h2>` + (role === 1 ? l.p1 : l.p2);
        document.getElementById('input-area').className = (role === 1 ? "" : "hidden");
        document.getElementById('code-input').value = "";
    }

    function check() {
        let val = document.getElementById('code-input').value.toUpperCase().trim();
        if(val === data[level].code) {
            level++;
            document.getElementById('feedback').innerHTML = "<p style='color:var(--neon)'>SYNC VOLTOOID.</p>";
            setTimeout(() => { document.getElementById('feedback').innerText = ""; loadLevel(); }, 1500);
        } else {
            document.getElementById('feedback').innerHTML = "<p class='warning'>!! DE-SYNC GEDETECTEERD !!</p>";
        }
    }

    function win() {
        document.getElementById('game').innerHTML = `
            <h1 style="color:var(--neon)">> STATUS: VRIJ</h1>
            <p>De Corruptie is gestopt.</p>
            <p>Antoine & Maxine hebben het systeem overleefd.</p>
            <p>TIJD: ${document.getElementById('timer').innerText}</p>
            <button class="btn" onclick="window.location.href='index.html'">AFSLUITEN</button>
        `;
    }
</script>

</body>
</html>
