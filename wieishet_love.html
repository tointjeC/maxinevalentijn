<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♀️ Wie is het? - Special Edition ❤️</title>
    <style>
        :root {
            --primary-pink: #ffafcc;
            --dark-pink: #ff2a6d;
            --soft-blue: #a2d2ff;
            --bg-color: #fdf0f6;
        }

        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', cursive; 
            background: var(--bg-color);
            background-image: radial-gradient(#ffc8dd 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; padding: 20px; color: #4a4a4a;
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: 0 auto; text-align: center; }

        h1 { color: var(--dark-pink); text-shadow: 2px 2px white; font-size: 2.5rem; margin-bottom: 10px; }

        .menu { 
            background: white; padding: 20px; border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(255, 175, 204, 0.4);
            margin-bottom: 30px; border: 3px solid var(--primary-pink);
        }

        button { 
            background: var(--primary-pink); color: white; border: none; 
            padding: 12px 20px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; margin: 5px; transition: 0.3s;
        }

        button.active { background: var(--dark-pink); }

        #my-pick { 
            background: white; padding: 10px 25px; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 15px;
            border: 3px solid var(--dark-pink); margin-bottom: 20px;
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #picked-img { height: 60px; width: 60px; object-fit: contain; }

        #board { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: white; border-radius: 15px; padding: 15px;
            cursor: pointer; transition: all 0.4s ease; 
            border: 2px solid #ffdeeb; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary-pink); }

        .card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        
        .card.eliminated { 
            opacity: 0.2; transform: scale(0.8) rotateX(40deg); 
            filter: grayscale(100%);
        }

        .hidden { display: none; }

        .floating-heart {
            position: fixed; color: var(--primary-pink);
            pointer-events: none; animation: floatUp 4s linear infinite;
            z-index: -1; opacity: 0.5;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wie is het? ❤️</h1>

        <div class="menu">
            <button onclick="changeTheme('mensen')" id="btn-mensen" class="active">👥 Mensen</button>
            <button onclick="changeTheme('dieren')" id="btn-dieren">🐾 Dieren</button>
            <button onclick="changeTheme('voorwerpen')" id="btn-voorwerpen">🎁 Voorwerpen</button>
            <br><br>
            <button onclick="resetGame()" style="background: var(--soft-blue);">🔄 Nieuw Spel / Reset</button>
            <button onclick="window.location.href='index.html'" style="background: #aaa;">🏠 Terug naar Game</button>
        </div>

        <div id="selection-screen">
            <h2 style="color: var(--dark-pink)">Stap 1: Klik op het plaatje dat JIJ bent</h2>
        </div>

        <div id="game-screen" class="hidden">
            <div id="my-pick">
                <span>Jij bent: <strong><span id="picked-name">...</span></strong></span>
                <img id="picked-img" src="" alt="">
            </div>
            <h2 style="color: #888;">Stap 2: Stel vragen en klik kaartjes weg!</h2>
        </div>

        <div id="board"></div>
    </div>

<script>

    const themes = {

            { name: "Detective", img: getImg("1f575") },
            { name: "Boer", img: getImg("1f468-200d-1f33e") },
            { name: "Zanger", img: getImg("1f468-200d-1f3a4") },
            { name: "Leraar", img: getImg("1f468-200d-1f3eb") },
            { name: "Brandweer", img: getImg("1f468-200d-1f692") },
            { name: "Oma", img: getImg("1f475") },
            { name: "Baby", img: getImg("1f476") },
            { name: "Elf", img: getImg("1f9dd") },
            { name: "Zombie", img: getImg("1f9df") },
            { name: "Vampier", img: getImg("1f9db") },
            { name: "Schilder", img: getImg("1f468-200d-1f3a8") },
            { name: "Piloot", img: getImg("1f468-200d-2708") },
            { name: "Rechter", img: getImg("1f468-200d-2696") },
            { name: "Monteur", img: getImg("1f468-200d-1f527") },
            { name: "Koning", img: getImg("1f451") },
            { name: "Superheld", img: getImg("1f9b8") },
            { name: "Kerstman", img: getImg("1f385") }
        ],
        dieren: [
            { name: "Leeuw", img: getImg("1f981") },
            { name: "Pinguïn", img: getImg("1f427") },
            { name: "Kikker", img: getImg("1f438") },
            { name: "Hond", img: getImg("1f415") },

            { name: "Kip", img: getImg("1f413") },

        ],
        voorwerpen: [
            { name: "Gitaar", img: getImg("1f3b8") },

            { name: "Auto", img: getImg("1f697") },
            { name: "Sleutel", img: getImg("1f511") },
            { name: "Cadeau", img: getImg("1f381") },
            { name: "Bril", img: getImg("1f453") },
            { name: "Voetbal", img: getImg("26bd") },
            { name: "Paraplu", img: "https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/2602.png" },
            { name: "Rugzak", img: getImg("1f392") },
            { name: "Horloge", img: getImg("231a") },
            { name: "Laptop", img: getImg("1f4bb") },
            { name: "Lamp", img: getImg("1f4a1") },
            { name: "Koffie", img: getImg("2615") },
            { name: "Ijsje", img: getImg("1f366") },
            { name: "Vliegtuig", img: getImg("2708") },
            { name: "Fiets", img: getImg("1f6b2") },
            { name: "Boek", img: getImg("1f4d6") },
            { name: "Trommel", img: getImg("1f941") },
            { name: "Zonnebril", img: getImg("1f576") },
            { name: "Schoen", img: getImg("1f45f") },
            { name: "Kaars", img: getImg("1f56f") },
            { name: "Verrekijker", img: getImg("1f50d") },
            { name: "Hamer", img: getImg("1f528") },
            { name: "Diamant", img: getImg("1f48e") }
        ]
    };

    let currentTheme = 'mensen';
    let isChoosing = true;

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const items = [...themes[currentTheme]];

        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <p>${item.name}</p>
            `;
            card.onclick = () => handleCardClick(item, card);
            board.appendChild(card);
        });
    }

    function handleCardClick(item, cardElement) {
        if (isChoosing) {
            document.getElementById('picked-name').innerText = item.name;
            document.getElementById('picked-img').src = item.img;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            isChoosing = false;
        } else {
            cardElement.classList.toggle('eliminated');
        }
    }

    function changeTheme(theme) {
        currentTheme = theme;
        document.querySelectorAll('.menu button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + theme).classList.add('active');
        resetGame();
    }

    function resetGame() {
        isChoosing = true;
        document.getElementById('selection-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        renderBoard();
    }

    function createHearts() {
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }, 800);
    }

    renderBoard();
    createHearts();
</script>

</body>
</html>
