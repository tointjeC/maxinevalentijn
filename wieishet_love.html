<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♀️ Wie is het? - Special Edition ❤️</title>
    <style>
        :root {
            --primary-pink: #ffafcc;
            --dark-pink: #ff2a6d;
            --soft-blue: #a2d2ff;
            --bg-color: #fdf0f6;
        }

        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', cursive; 
            background: var(--bg-color);
            background-image: radial-gradient(#ffc8dd 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; padding: 20px; color: #4a4a4a;
        }

        h1 { 
            color: var(--dark-pink); 
            text-shadow: 2px 2px white; 
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Romantisch Menu */
        .menu { 
            background: white; padding: 20px; border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(255, 175, 204, 0.4);
            margin-bottom: 30px; border: 3px solid var(--primary-pink);
        }

        button { 
            background: var(--primary-pink); color: white; border: none; 
            padding: 12px 25px; border-radius: 50px; cursor: pointer; 
            font-weight: bold; font-size: 16px; margin: 5px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px #eb8ba9;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 7px 0px #eb8ba9; background: #ff99bb; }
        button:active { transform: translateY(0px); box-shadow: 0 2px 0px #eb8ba9; }
        button.active { background: var(--dark-pink); box-shadow: 0 4px 0px #c91850; }

        /* Gekozen kaart display */
        #my-pick { 
            background: white; padding: 15px 30px; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 15px;
            border: 3px solid var(--dark-pink); margin-bottom: 20px;
            animation: heartBeat 2s infinite;
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        #picked-img { height: 50px; border-radius: 10px; }

        /* Het Speelbord */
        #board { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; margin-top: 20px;
        }

        .card { 
            background: white; border-radius: 15px; padding: 15px;
            cursor: pointer; transition: all 0.4s ease; 
            position: relative; border: 2px solid #ffdeeb;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            perspective: 1000px;
        }

        .card:hover { transform: translateY(-5px) rotate(2deg); border-color: var(--primary-pink); }

        .card img { width: 100%; height: 90px; object-fit: contain; margin-bottom: 10px; }
        .card p { margin: 0; font-weight: bold; font-size: 15px; color: #666; }

        /* Weggestreept: kaart klapt weg */
        .card.eliminated { 
            opacity: 0.3; transform: rotateX(70deg); 
            filter: grayscale(80%) sepia(50%);
            pointer-events: auto;
        }
        .card.eliminated::after {
            content: "❤️"; position: absolute; top: 10px; right: 10px; font-size: 20px;
        }

        .hidden { display: none; }

        /* Kleine hartjes versiering */
        .floating-heart {
            position: fixed; color: var(--primary-pink);
            pointer-events: none; animation: floatUp 4s linear infinite;
            z-index: -1; opacity: 0.6;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wie is het? ❤️</h1>

        <div class="menu">
            <div style="margin-bottom: 15px;">
                <button onclick="changeTheme('mensen')" id="btn-mensen" class="active">👥 Mensen</button>
                <button onclick="changeTheme('dieren')" id="btn-dieren">🐾 Dieren</button>
                <button onclick="changeTheme('voorwerpen')" id="btn-voorwerpen">🎁 Voorwerpen</button>
            </div>
            <button onclick="resetGame()" style="background: var(--soft-blue); box-shadow: 0 4px 0px #76b1e6;">🔄 Nieuw Spel</button>
        </div>

        <div id="selection-screen">
            <h2 style="color: var(--dark-pink)">Kies eerst je geheime figuurtje...</h2>
        </div>

        <div id="game-screen" class="hidden">
            <div id="my-pick">
                <span>Jij bent de <strong><span id="picked-name">...</span></strong></span>
                <img id="picked-img" src="" alt="">
            </div>
            <h2 style="color: #888; font-size: 1.2rem;">Klik op de plaatjes om ze weg te strepen!</h2>
        </div>

        <div id="board"></div>
    </div>

            { name: "Hamer", img: "https://openmoji.org/data/color/svg/1F528.svg" },
            { name: "Diamant", img: "https://openmoji.org/data/color/svg/1F48E.svg" }
        ]
    };

    let currentTheme = 'mensen';
    let isChoosing = true;

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const items = [...themes[currentTheme]].sort(() => Math.random() - 0.5);

        items.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <p>${item.name}</p>
            `;
            card.onclick = () => handleCardClick(item, card);
            board.appendChild(card);
        });
    }

    function handleCardClick(item, cardElement) {
        if (isChoosing) {
            document.getElementById('picked-name').innerText = item.name;
            document.getElementById('picked-img').src = item.img;
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            isChoosing = false;
        } else {
            cardElement.classList.toggle('eliminated');
        }
    }

    function changeTheme(theme) {
        currentTheme = theme;
        document.querySelectorAll('.menu button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + theme).classList.add('active');
        resetGame();
    }

    function resetGame() {
        isChoosing = true;
        document.getElementById('selection-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        renderBoard();
    }

    function createHearts() {
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }, 600);
    }

    renderBoard();
    createHearts();
</script>

</html>
