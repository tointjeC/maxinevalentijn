<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 Art Studio: Live ❤️</title>
    <style>
        :root { --teal: #006d77; --pink: #ffafcc; }
        body { font-family: -apple-system, sans-serif; text-align: center; margin: 0; background: #f0f4f4; overflow: hidden; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        
        /* Setup Scherm */
        #setup { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border-radius: 30px; border: 2px solid var(--teal); width: 250px; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; }
        
        /* Game Scherm */
        #canvas-wrap { flex-grow: 1; position: relative; background: white; margin: 10px; border-radius: 20px; border: 3px solid var(--teal); }
        canvas { width: 100%; height: 100%; touch-action: none; display: block; }
        
        .btn { padding: 15px 30px; border-radius: 50px; border: none; background: var(--teal); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-small { padding: 8px 15px; font-size: 12px; background: #eee; color: #333; margin-top: 5px; }
        
        #secret-box { background: var(--pink); padding: 10px; font-weight: bold; color: white; }
        .toolbar { padding: 10px; background: white; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .hidden { display: none !important; }
        .color { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="color: var(--teal)">🎨 Art Studio Live</h2>
    <p>Kies jullie kamercode:</p>
    <input type="text" id="room" placeholder="bijv. date2026">
    <button class="btn" onclick="init()">Starten</button>
</div>

<div class="container hidden" id="game">
    <div id="role-selector" class="toolbar">
        <button class="btn" onclick="setRole('gids')">👤 Ik ben de Gids</button>
        <button class="btn" onclick="setRole('schilder')">🖌️ Ik ben de Schilder</button>
    </div>

    <div id="secret-box" class="hidden">
        <div id="task">...</div>
        <button class="btn-small" onclick="newTask()">Volgende zin 🔄</button>
    </div>

    <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>

    <div id="painter-tools" class="toolbar hidden">
        <div class="color" style="background: black" onclick="changeColor('black')"></div>
        <div class="color" style="background: #ff4d6d" onclick="changeColor('#ff4d6d')"></div>
        <div class="color" style="background: #3a86ff" onclick="changeColor('#3a86ff')"></div>
        <div class="color" style="background: #38b000" onclick="changeColor('#38b000')"></div>
        <button class="btn-small" onclick="clearBoard()">🗑️ Wis</button>
    </div>
</div>

<script>
    let role = '', drawing = false, lastPos = null, color = 'black';
    const assignments = ["Pinguïn met ballon", "Pizza ster", "Dansende banaan", "Antoine & Maxine hand in hand", "Gitaar met vleugels", "Kat met zonnebril", "Koffie met hartjes", "Vliegende auto", "Donut met glitters", "Robot met bloem"];
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let channel;

    function init() {
        const room = document.getElementById('room').value.trim().toLowerCase();
        if(!room) return alert("Voer een code in!");
        
        // We gebruiken Pie.host, een gratis en snelle realtime service
        const script = document.createElement('script');
        script.src = "https://unpkg.com/pie-client@1.0.1/dist/pie.js";
        script.onload = () => {
            const pie = new PieClient();
            channel = pie.join('art-date-' + room);
            
            channel.onData((data) => {
                if(data.type === 'draw') drawLine(data.from, data.to, data.color);
                if(data.type === 'clear') ctx.clearRect(0,0,canvas.width,canvas.height);
                if(data.type === 'task') document.getElementById('task').innerText = data.text;
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            resize();
        };
        document.head.appendChild(script);
    }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineCap = 'round';
        ctx.lineWidth = 4;
    }

    function setRole(r) {
        role = r;
        document.getElementById('role-selector').classList.add('hidden');
        document.getElementById('painter-tools').classList.toggle('hidden', r !== 'schilder');
        document.getElementById('secret-box').classList.toggle('hidden', r !== 'gids');
        if(r === 'gids') newTask();
    }

    function newTask() {
        const text = assignments[Math.floor(Math.random()*assignments.length)];
        document.getElementById('task').innerText = text;
        channel.send({type: 'task', text: text});
    }

    function changeColor(c) { color = c; }
    function clearBoard() { 
        ctx.clearRect(0,0,canvas.width,canvas.height);
        channel.send({type: 'clear'});
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
    }

    function drawLine(from, to, c) {
        ctx.strokeStyle = c;
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
    }

    const start = (e) => { if(role==='schilder') { drawing = true; lastPos = getPos(e); }};
    const stop = () => { drawing = false; lastPos = null; };
    const move = (e) => {
        if(!drawing || role !== 'schilder') return;
        const currentPos = getPos(e);
        drawLine(lastPos, currentPos, color);
        channel.send({type: 'draw', from: lastPos, to: currentPos, color: color});
        lastPos = currentPos;
    };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
    canvas.addEventListener('touchend', stop);
</script>

</body>
</html>
