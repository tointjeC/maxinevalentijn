<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>🎨 Art Studio: Live Pictionary ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root { --deep-teal: #006d77; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        canvas { background: white; border: 3px solid var(--deep-teal); border-radius: 10px; width: 100%; max-width: 600px; touch-action: none; cursor: crosshair; }
        .setup-box { background: #e9f5f5; padding: 20px; border-radius: 15px; border: 2px solid var(--deep-teal); }
        input { padding: 12px; border-radius: 25px; border: 1px solid #ccc; width: 200px; margin-bottom: 10px; font-size: 16px; text-align: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; background: var(--deep-teal); color: white; margin: 5px; }
        .hidden { display: none; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; display: inline-block; cursor: pointer; }
        #secret-box { background: #fff0f3; border: 2px dashed #ff4d6d; padding: 15px; border-radius: 15px; margin: 15px 0; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2a9d8f; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Live Art Studio</h1>

    <div id="setup-area" class="setup-box">
        <p>Voer jullie kamercode in:</p>
        <input type="text" id="room-id" placeholder="bijv: antoinemaxine">
        <br>
        <button class="btn" onclick="connect()">Start Studio</button>
    </div>

    <div id="game-area" class="hidden">
        <p><span id="status-dot" class="status-dot"></span> <span id="status-text">Verbinden...</span></p>
        
        <div id="role-selection">
            <button class="btn" onclick="setRole('gids')">👤 Ik ben de Gids</button>
            <button class="btn" onclick="setRole('schilder')">🖌️ Ik ben de Schilder</button>
        </div>

        <div id="secret-box" class="hidden">
            <p>Opdracht voor de gids:</p>
            <h2 id="assignment">...</h2>
            <button class="btn" style="font-size: 12px;" onclick="sendNewAssignment()">🔄 Volgende</button>
        </div>

        <canvas id="canvas" width="600" height="500"></canvas>

        <div id="controls" class="hidden">
            <div style="margin: 10px 0;">
                <div class="color-btn" style="background: #000;" onclick="setColor('#000')"></div>
                <div class="color-btn" style="background: #ff4d6d;" onclick="setColor('#ff4d6d')"></div>
                <div class="color-btn" style="background: #3a86ff;" onclick="setColor('#3a86ff')"></div>
                <div class="color-btn" style="background: #38b000;" onclick="setColor('#38b000')"></div>
                <button class="btn" style="background: #eee; color: #333; padding: 5px 10px;" onclick="requestClear()">🗑️ Wis</button>
            </div>
        </div>
    </div>
</div>

<script>
    let client, topic, myRole = '', painting = false;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const assignments = ["Een pinguïn met een hartjes-ballon", "Een pizza ster", "Een dansende banaan", "Antoine en Maxine hand in hand", "Een gitaar met vleugels", "Een luiaard op een regenboog", "Een kat met een zonnebril", "Een kopje koffie met hartjesstoom"];

    function connect() {
        const roomId = document.getElementById('room-id').value.toLowerCase().trim();
        if (!roomId) return alert("Kies een code!");
        
        topic = 'artdate2026/' + roomId;
        // We gebruiken een publieke broker die altijd bereikbaar is via websockets
        client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt');

        client.on('connect', () => {
            client.subscribe(topic);
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('status-dot').classList.add('online');
            document.getElementById('status-text').innerText = "Live verbinding actief!";
        });

        client.on('message', (t, message) => {
            const data = JSON.parse(message.toString());
            if (data.type === 'draw') renderLine(data);
            if (data.type === 'clear') ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (data.type === 'new_task') document.getElementById('assignment').innerText = data.text;
        });
    }

    function setRole(role) {
        myRole = role;
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('controls').classList.toggle('hidden', role !== 'schilder');
        document.getElementById('secret-box').classList.toggle('hidden', role !== 'gids');
        if(role === 'gids') sendNewAssignment();
    }

    function sendNewAssignment() {
        const text = assignments[Math.floor(Math.random() * assignments.length)];
        client.publish(topic, JSON.stringify({ type: 'new_task', text: text }));
    }

    function setColor(c) { ctx.strokeStyle = c; }
    function requestClear() { client.publish(topic, JSON.stringify({ type: 'clear' })); }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    canvas.addEventListener('mousedown', (e) => { if(myRole==='schilder') painting = true; });
    canvas.addEventListener('touchstart', (e) => { if(myRole==='schilder') { e.preventDefault(); painting = true; }});

    canvas.addEventListener('mousemove', (e) => {
        if (!painting) return;
        const pos = getPos(e);
        const drawData = { type: 'draw', x: pos.x, y: pos.y, color: ctx.strokeStyle, isNew: false };
        renderLine(drawData);
        client.publish(topic, JSON.stringify(drawData));
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!painting) return;
        e.preventDefault();
        const pos = getPos(e);
        const drawData = { type: 'draw', x: pos.x, y: pos.y, color: ctx.strokeStyle };
        renderLine(drawData);
        client.publish(topic, JSON.stringify(drawData));
    });

    window.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
    window.addEventListener('touchend', () => { painting = false; ctx.beginPath(); });

    function renderLine(data) {
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = data.color;
        ctx.lineTo(data.x, data.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(data.x, data.y);
    }
</script>
</body>
</html>
