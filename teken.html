<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>🎨 Art Studio: Live Pictionary!❤️</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --deep-teal: #006d77; 
            --soft-pink: #ffafcc;
            --bg: #f8f9fa;
        }
        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 10px; color: #333;
            text-align: center;
        }
        .container { 
            max-width: 950px; margin: 0 auto; background: white; 
            padding: 20px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .setup-box {
            background: #e9f5f5; padding: 15px; border-radius: 20px;
            border: 2px solid var(--deep-teal); margin-bottom: 15px;
        }
        input[type="text"] { padding: 10px; border-radius: 50px; border: 1px solid #ccc; width: 220px; text-align: center; outline: none; }

        .toolbar { 
            display: flex; justify-content: center; gap: 10px; 
            margin-bottom: 15px; flex-wrap: wrap; 
        }
        
        canvas { 
            background: #fff; border: 4px solid var(--deep-teal); 
            border-radius: 15px; cursor: crosshair; touch-action: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            width: 100%; max-width: 800px; height: auto;
        }

        .controls-row { 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; margin-top: 15px; flex-wrap: wrap;
        }
        
        .color-picker { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; 
            padding: 10px; background: #ececec; border-radius: 15px;
        }

        .color-btn { 
            width: 30px; height: 30px; border-radius: 50%; 
            border: 2px solid white; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .color-btn.active { border: 2px solid var(--deep-teal); transform: scale(1.1); }

        .btn { 
            padding: 10px 20px; border: none; border-radius: 50px; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-main { background: var(--deep-teal); color: white; }
        .btn-clear { background: #ff4d6d; color: white; }
        
        #secret-box { 
            background: #fff0f3; border: 2px dashed #ff4d6d;
            padding: 15px; border-radius: 15px; margin-bottom: 15px;
        }
        .hidden { display: none; }
        .online-tag { color: #2a9d8f; font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Live Art Studio</h1>
    
    <div id="setup-area" class="setup-box">
        <p>Voer de kamercode in die jullie hebben afgesproken:</p>
        <input type="text" id="room-id" placeholder="bijv: onze-date">
        <button class="btn btn-main" onclick="startLive()">Verbinden</button>
    </div>

    <div id="game-area" class="hidden">
        <span id="status" class="online-tag">Initialiseren...</span>
        
        <div class="toolbar">
            <button id="role-gids" class="btn btn-main" onclick="selectRole('gids')">👤 Ik ben de Gids</button>
            <button id="role-schilder" class="btn btn-main" onclick="selectRole('schilder')">🖌️ Ik ben de Schilder</button>
            <button class="btn btn-clear" onclick="requestClear()">🗑️ Wis bord</button>
        </div>

        <div id="secret-box" class="hidden">
            <p style="margin:0; font-size: 14px; color: #ff4d6d; font-weight: bold;">GEHEIM:</p>
            <h2 id="assignment" style="color: var(--deep-teal); margin: 10px 0;">...</h2>
            <button class="btn btn-main" style="font-size: 11px; padding: 5px 15px;" onclick="newAssignment()">🔄 Volgende opdracht</button>
        </div>

        <canvas id="canvas" width="800" height="500"></canvas>

        <div id="painter-controls" class="controls-row hidden">
            <div class="color-picker">
                <div class="color-btn active" style="background: #000000;" onclick="setColor('#000000', this)"></div>
                <div class="color-btn" style="background: #ff4d6d;" onclick="setColor('#ff4d6d', this)"></div>
                <div class="color-btn" style="background: #3a86ff;" onclick="setColor('#3a86ff', this)"></div>
                <div class="color-btn" style="background: #38b000;" onclick="setColor('#38b000', this)"></div>
                <div class="color-btn" style="background: #ffbe0b;" onclick="setColor('#ffbe0b', this)"></div>
                <div class="color-btn" style="background: #ffffff; border: 1px solid #ccc;" onclick="setColor('#ffffff', this)">🧽</div>
            </div>
            <input type="range" id="sizeRange" min="2" max="40" value="6" oninput="setSize(this.value)">
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const assignments = ["Een pinguïn met een hartjes-ballon", "Een olifant op een roze skateboard", "Een kat die een zonnebril draagt", "Een pizza ster", "Een dansende banaan", "Een gitaar met vleugels", "Antoine en Maxine hand in hand", "Een picknick onder de boom", "Een raket naar de hartjesmaan", "Een luiaard die aan een regenboog hangt"]; 
    // ... (denk aan je lijst van 100+, ik heb ze hier kort gehouden voor de overzichtelijkheid van de fix)

    let peer, conn;
    let painting = false;
    let myRole = ''; 
    let currentColor = '#000000';
    let currentSize = 6;

    function startLive() {
        const id = document.getElementById('room-id').value.toLowerCase().trim();
        if(!id) return alert("Kies een code!");
        
        const finalId = 'art-love-2026-' + id;
        
        // We proberen eerst de host te zijn
        peer = new Peer(finalId);

        peer.on('open', (id) => {
            console.log('Mijn ID is: ' + id);
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('status').innerText = "Wachten op Maxine...";
        });

        // Als iemand anders al de host is, krijgen we een 'unavailable-id' fout
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                console.log("ID bezet, ik verbind als gast...");
                peer.destroy(); // Stop de huidige poging
                connectAsGuest(finalId);
            } else {
                alert("Fout: " + err.type);
            }
        });

        // Als we Host zijn: luister naar Maxine die verbindt
        peer.on('connection', (connection) => {
            conn = connection;
            setupEvents();
        });
    }

    function connectAsGuest(hostId) {
        peer = new Peer(); // Maak een random ID voor onszelf
        peer.on('open', () => {
            conn = peer.connect(hostId);
            setupEvents();
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
        });
    }

    function setupEvents() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "💖 Verbonden! Kies je rol.";
        });

        conn.on('data', (data) => {
            if(data.type === 'draw') renderLine(data);
            if(data.type === 'clear') ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(data.type === 'assignment') document.getElementById('assignment').innerText = data.text;
        });
        
        conn.on('close', () => {
            document.getElementById('status').innerText = "❌ Verbinding verbroken.";
        });
    }

    // --- DE REST VAN JE LOGICA (SelectRole, Draw, etc.) BLIJFT HETZELFDE ---
    function selectRole(role) {
        myRole = role;
        document.getElementById('role-gids').style.background = (role === 'gids' ? 'var(--deep-teal)' : '#ccc');
        document.getElementById('role-schilder').style.background = (role === 'schilder' ? 'var(--deep-teal)' : '#ccc');
        document.getElementById('secret-box').classList.toggle('hidden', role !== 'gids');
        document.getElementById('painter-controls').classList.toggle('hidden', role !== 'schilder');
        if(role === 'gids') newAssignment();
    }

    function newAssignment() {
        const text = assignments[Math.floor(Math.random() * assignments.length)];
        document.getElementById('assignment').innerText = text;
        if(conn && conn.open) conn.send({ type: 'assignment', text: text });
    }

    function setColor(c, btn) {
        currentColor = c;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setSize(s) { currentSize = s; }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDraw(e) {
        if(myRole !== 'schilder') return;
        painting = true;
        draw(e);
    }

    function stopDraw() { painting = false; ctx.beginPath(); }

    function draw(e) {
        if(!painting || myRole !== 'schilder') return;
        const pos = getPos(e);
        const drawData = { type: 'draw', x: pos.x, y: pos.y, color: currentColor, size: currentSize };
        renderLine(drawData);
        if(conn && conn.open) conn.send(drawData);
    }

    function renderLine(data) {
        ctx.lineWidth = data.size;
        ctx.lineCap = 'round';
        ctx.strokeStyle = data.color;
        ctx.lineTo(data.x, data.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(data.x, data.y);
    }

    function requestClear() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(conn && conn.open) conn.send({ type: 'clear' });
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);
</script>

</body>
</html>
